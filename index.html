<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon-16x16.png">
    <script defer src="script.js"></script>
    <title>Pokedex</title>
</head>
<body>
    <main>
        <img src="#" alt="pokemon" class="pokemon_img">

        <h1 class="pokemon_data">
            <span class="pokemon_number"></span>-
            <span class="pokemon_name"></span>
            <span id="type"></span>
            <span id="type2"></span>

            
        </h1>
        <form class="form">
            <input type="search" class="input_search" placeholder="Name or Number" required>
        </form>
        <div class="buttons">
            <button class="button btn-prev" >&lt; Prev</button>
            <button class="random">R</button>
            <button class="button btn-next" >Next &gt;</button>
        </div>
        <img src="pokedex.png" alt="pokedex" class="pokedex">
    </main>
</body>
</html>
